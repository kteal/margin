name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-title:
    name: PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check conventional commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node <<'NODE'
          const title = process.env.PR_TITLE || '';
          const pattern = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._-]+\))?!?: .+/;

          if (!pattern.test(title)) {
            console.error(`Pull request title must follow Conventional Commits: ${title}`);
            console.error('Example: feat: add note search');
            console.error('Example: ci(deps): bump actions/checkout from 4 to 7');
            process.exit(1);
          }
          NODE

  node:
    name: Node checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check extension syntax
        run: npm run check

      - name: Check npm package contents
        run: npm pack --dry-run

  nix:
    name: Nix build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Build extension package
        run: nix build --print-build-logs

      - name: Build VSIX
        run: nix build .#vsix --print-build-logs

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: margin-vsix
          path: result/*.vsix
          if-no-files-found: error
